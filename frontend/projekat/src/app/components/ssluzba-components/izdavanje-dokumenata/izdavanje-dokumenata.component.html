<div class="content">
    <h2>Izdavanje dokumenata</h2>
    <div class="dugme">
        <p>Profesori</p>
        <p-inputSwitch [(ngModel)]="visible" />
        <p>Studenti</p>
    </div>
    <div *ngIf="!visible">
        <div class="pretraga">
            <p-inputGroup>
                <input type="text" [(ngModel)]="pretraga.ime" pInputText placeholder=" ime" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="pretraga.prezime" pInputText placeholder=" prezime" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="pretraga.email" pInputText placeholder="email" />
            </p-inputGroup>
            <p-button icon="pi pi-search" (click)="pretraziProfesore()" rounded="true" [raised]="true" />
            <p-button icon="pi pi-times" (click)="ponistiPretragu()" rounded="true" [raised]="true" severity="danger"  />
        </div>
        <p-table [value]="filtriraniProfesori">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="id">id <p-sortIcon field="id"></p-sortIcon></th>
                    <th pSortableColumn="imr">ime <p-sortIcon field="imr"></p-sortIcon></th>
                    <th pSortableColumn="prezime">prezime <p-sortIcon field="prezime"></p-sortIcon></th>
                    <th pSortableColumn="email">email <p-sortIcon field="email"></p-sortIcon></th>
                    <th>export</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-p let-rowIndex="rowIndex">
                <tr [ngClass]="{'table-row-even': rowIndex % 2 === 0, 'table-row-odd': rowIndex % 2 !== 0}">
                    <td>{{ p.id }}</td>
                    <td>{{ p.ime }}</td>
                    <td>{{ p.prezime }}</td>
                    <td>{{ p.email }}</td>
                    <td>
                        <p-button label="xml" (onClick)="xmlProfesor(p)" rounded="true" severity="warning" />
                        <p-button label="pdf" (onClick)="pdfProfesor(p)" rounded="true" severity="help"/>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
    <div *ngIf="visible">
        <div class="pretraga">
            <p-inputGroup>
                <input type="text" [(ngModel)]="pretraga.ime" pInputText placeholder=" ime" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="pretraga.prezime" pInputText placeholder=" prezime" />
            </p-inputGroup>
            <p-inputGroup>
                <input type="text" [(ngModel)]="pretraga.email" pInputText placeholder="email" />
            </p-inputGroup>
            <p-button icon="pi pi-search" (click)="pretraziStudente()" rounded="true" [raised]="true" />
            <p-button icon="pi pi-times" (click)="ponistiPretragu()" rounded="true" [raised]="true" severity="danger"  />
        </div>
        <p-table [value]="filtriraniStudenti">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="id">id <p-sortIcon field="id"></p-sortIcon></th>
                    <th pSortableColumn="imr">ime <p-sortIcon field="imr"></p-sortIcon></th>
                    <th pSortableColumn="prezime">prezime <p-sortIcon field="prezime"></p-sortIcon></th>
                    <th pSortableColumn="email">email <p-sortIcon field="email"></p-sortIcon></th>
                    <th>export</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-s let-rowIndex="rowIndex">
                <tr [ngClass]="{'table-row-even': rowIndex % 2 === 0, 'table-row-odd': rowIndex % 2 !== 0}">
                    <td>{{ s.id }}</td>
                    <td>{{ s.ime }}</td>
                    <td>{{ s.prezime }}</td>
                    <td>{{ s.email }}</td>
                    <td>
                        <p-button label="xml" (onClick)="xmlStudent(s)" rounded="true" severity="warning" />
                        <p-button label="pdf" (onClick)="pdfStudent(s)" rounded="true" severity="help"/>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
