<div class="content">
    <h2>{{fakultet?.naziv}}</h2>
    <!-- <img src="{{fakultet?.slika}}" alt="(FAKULTET SLIKA)"> -->
    <p>{{fakultet?.tekstualniOpis}}</p>

    <p-divider />

    <h3>Smerovi</h3>
    <ul>
        <li *ngFor="let sp of studijskiProgrami">
            <a *ngIf="fakultet" [routerLink]="['/fakultet', fakultet.sifraFakulteta, 'studijski-program', sp.sifraSP]">{{sp.naziv}}</a>
        </li>
    </ul>

    <p-divider />

    <h3>Dekan</h3>
    <p>{{fakultet?.dekan}}</p>

    <p-divider />

    <h3>Adresa</h3>
    <p>{{fakultet?.adresa}}</p>
    <div class="map-container">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3284.083970150712!2d19.83505659248146!3d45.25239800730134!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x475b10613de93455%3A0xb6f7d683724fe28!2z0J3QvtCy0Lgg0KHQsNC0!5e0!3m2!1ssr!2srs!4v1723223074868!5m2!1ssr!2srs" 
        ></iframe>
    </div>

    <p-divider />

    <h3>Kontakt</h3>
    <p>{{fakultet?.kontakt}}</p>
</div>
