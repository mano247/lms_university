<header>
    <div class="header-left">
        <img src="assets/images/logo.png" alt="logo" class="logo">  
        <a routerLink="/">
            <h1>{{univerzitet.naziv}}</h1>
        </a>
    </div>
    <div class="avatar" *ngIf="isLoggedIn()">
        <p-avatar 
            label="P" 
            styleClass="mr-2" 
            size="large" 
            shape="circle" 
            (click)="menu.toggle($event)" />
        <p-tieredMenu #menu [model]="items" [popup]="true" />
    </div>
    <div class="avatar" *ngIf="!isLoggedIn()">
        <p-button (onClick)="prijavaLink()" label="Prijava" icon="pi pi-sign-in" severity="info" [raised]="true"/>
    </div>
</header>
