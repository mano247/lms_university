<div class="content">
    <h3>Moj profil</h3>

    <h4>Ime i prezime</h4>
    <p>{{ korisnik?.ime || 'Ime nije postavljeno' }}</p>
    <p>{{ korisnik?.prezime || 'Prezime nije postavljeno' }}</p>

    <p-divider />

    <h4>email</h4>
    <p>{{korisnik?.email}}</p>

    <p-divider />
    
    <h4>korisnicko ime</h4>
    <p>{{korisnik?.korisnickoIme}}</p>
    

    <p-button label="Uredi profil" (onClick)="editDialog()" [rounded]="true" [raised]="true"/>

    <p-dialog header="Uredi profil" [modal]="true" [(visible)]="visible" [draggable]="false">
        <form [formGroup]="profilForm" (ngSubmit)="sacuvajIzmene()">
            <div class="form-group">
                <label for="ime">Ime:</label>
                <input pInputText id="ime" formControlName="ime" />
            </div>
            <div class="form-group">
                <label for="prezime">Prezime:</label>
                <input pInputText id="prezime" formControlName="prezime"/>
            </div>
            <div class="form-group">
                <label for="email" class="font-semibold w-6rem">Email:</label>
                <input pInputText id="email" type="email" formControlName="email" />
            </div>
            <div class="form-group">
                <label for="korisnickoIme">Korisnicko ime:</label>
                <input pInputText id="korisnickoIme" formControlName="korisnickoIme"/>
            </div>
            <div class="form-group">
                <label for="lozinka">Lozinka:</label>
                <input pInputText id="lozinka" type="password" formControlName="lozinka" />
            </div>
            <div>
                <p-button label="Izmeni" [rounded]="true" [raised]="true" severity="success" type="submit"/>
                <p-button label="Ponisti" [rounded]="true" [raised]="true" severity="danger" (onClick)="visible = false" />
            </div>
        </form>
    </p-dialog>
</div>  
<p-toast />
